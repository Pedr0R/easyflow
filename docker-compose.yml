name: easyflow-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: easyflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: easyflow-pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "${PGADMIN_PORT}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: easyflow-api
    profiles: ["app"]
    working_dir: /usr/src/app
    command: sh -c "if [ -f package-lock.json ]; then npm ci; else npm install; fi && npm run start:dev"
    environment:
      NODE_ENV: development
      PORT: ${API_PORT}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    ports:
      - "${API_PORT}:3000"
    volumes:
      - ./apps/api:/usr/src/app
      - api_node_modules:/usr/src/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: easyflow-web
    profiles: ["app"]
    working_dir: /usr/src/app
    command: sh -c "if [ -f package-lock.json ]; then npm ci; else npm install; fi && npm start -- --host 0.0.0.0 --port 4200"
    environment:
      NODE_ENV: development
      API_BASE_URL: http://localhost:${API_PORT}
    ports:
      - "${WEB_PORT}:4200"
    volumes:
      - ./apps/web:/usr/src/app
      - web_node_modules:/usr/src/app/node_modules
    depends_on:
      - api

volumes:
  postgres_data:
  pgadmin_data:
  api_node_modules:
  web_node_modules:
