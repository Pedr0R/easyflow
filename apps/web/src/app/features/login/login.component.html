<div class="login-container">
  <div class="login-box glass-panel">
    <div class="login-header">
      <h2>Welcome Back</h2>
      <p>Sign in to EasyFlow</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group" style="margin-bottom: 1rem;">
        <label for="email">Email</label>
        <input id="email" type="email" formControlName="email" placeholder="nome@empresa.com" />
      </div>

      <div class="form-group" style="margin-bottom: 2rem;">
        <label for="senha">Password</label>
        <input id="senha" type="password" formControlName="senha" placeholder="********" />
      </div>

      @if (errorMessage()) {
        <p class="error-msg" style="margin-bottom: 1rem;">{{ errorMessage() }}</p>
      }

      <button type="submit" class="btn btn-primary" style="width: 100%" [disabled]="loginForm.invalid || isLoading()">
        {{ isLoading() ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>
  </div>
</div>
